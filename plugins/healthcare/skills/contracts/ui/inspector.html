<!doctype html><meta charset="utf-8"><title>contracts · inspector</title>
<style>
  :root {
    --ink:#1f1e1d; --clay:#73726c; --faint:#b8b7b2; --line:#e3e0d6; --bg:#faf9f5; --panel:#f5f4ed;
    --acc:#d97757; --ok:#788c5d; --warn:#b88c3f; --err:#b85c5c;
    --serif: 'Anthropic Serif', Fraunces, Lora, 'Iowan Old Style', 'Palatino Linotype', Charter, Georgia, serif;
    --mono: 'Anthropic Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --shadow: 0 1px 3px rgba(20,20,19,.06), 0 1px 2px rgba(20,20,19,.04);
  }
  ::selection { background: rgba(217,119,87,.18) }
  * { box-sizing:border-box }
  body { margin:0; font:13.5px/1.5 var(--serif); color:var(--ink); background:var(--bg); height:100vh;
         display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility }
  .label { font:500 10px var(--mono); text-transform:uppercase; letter-spacing:.22em; color:var(--clay) }

  header { padding:24px 28px 18px; border-bottom:1px solid var(--line) }
  header h1 { margin:0 0 6px; font:italic 500 26px/1.1 var(--serif); letter-spacing:-.01em }
  header p { margin:0; color:var(--clay); font-size:13px; max-width:72ch }

  main { flex:1; display:flex; min-height:0 }
  aside { width:320px; border-right:1px solid var(--line); overflow-y:auto; padding:20px 14px }
  aside h2 { font:500 10px var(--mono); text-transform:uppercase; letter-spacing:.22em; color:var(--clay); margin:0 6px 14px }
  #panel { flex:1; display:flex; flex-direction:column; min-height:0; background:#fff }
  .banner { border-bottom:1px solid var(--line); padding:16px 28px; font-size:14px; background:var(--panel) }
  nav { position:sticky; top:0; z-index:1; display:flex; gap:0; border-bottom:1px solid var(--line); background:#fff; padding:0 18px }
  nav button { font:500 10.5px var(--mono); text-transform:uppercase; letter-spacing:.16em; background:none; border:none;
               border-bottom:2px solid transparent; padding:12px 13px 10px; cursor:pointer; color:var(--clay); transition:color .12s }
  nav button:hover { color:var(--ink) }
  nav button.on { color:var(--ink); border-bottom-color:var(--acc) }
  nav button .n { font:10px var(--mono); letter-spacing:0; color:var(--faint); margin-left:6px }
  nav .tabsep { width:1px; background:var(--line); margin:10px 14px; align-self:stretch }
  nav .tabarr { color:var(--faint); align-self:center; padding:0 2px; font-size:13px }
  #detail { flex:1; overflow-y:auto; padding:18px 22px }

  .run { width:100%; text-align:left; border:none; border-left:2px solid transparent; padding:12px 12px 12px 14px;
         margin-bottom:2px; background:none; cursor:pointer; font:inherit; transition:border-color .12s, background .12s }
  .run:hover { background:rgba(0,0,0,.02) }
  .run.sel { border-left-color:var(--acc); background:#fff; box-shadow:var(--shadow) }
  .run .top { display:flex; align-items:baseline; gap:8px }
  .run .id { font:10px var(--mono); letter-spacing:.04em; color:var(--faint); margin-left:auto;
             max-width:110px; overflow:hidden; text-overflow:ellipsis }
  .run .q { font:14px/1.45 var(--serif); margin:7px 0 8px; display:-webkit-box; -webkit-line-clamp:2;
            -webkit-box-orient:vertical; overflow:hidden }
  .run .meta { font:10px var(--mono); letter-spacing:.06em; color:var(--clay); display:flex; gap:14px }
  .run .meta b { font-weight:500; color:var(--ink) }

  .badge { display:inline-block; font:500 9.5px var(--mono); text-transform:uppercase; letter-spacing:.18em;
           padding:0; color:var(--clay) }
  .badge::before { content:"● "; font-size:8px; vertical-align:1px }
  .b-running, .b-awaiting_human { color:var(--acc) } .b-done, .b-ratified { color:var(--ok) }
  .b-failed, .b-rejected { color:var(--err) } .b-proposed { color:var(--warn) }

  .card { border:1px solid var(--line); border-radius:6px; padding:12px 14px; margin-bottom:8px;
          background:#fff; box-shadow:var(--shadow) }
  .flat { padding:4px 0 18px; border-bottom:1px solid var(--line) }
  .flat:last-child { border-bottom:none }
  .kv { display:grid; grid-template-columns:100px 1fr; gap:8px 14px; font-size:13.5px }
  .kv dt { font:500 9.5px var(--mono); text-transform:uppercase; letter-spacing:.16em; color:var(--clay); padding-top:2px }
  .kv dd { margin:0 }
  .ref { font:10px var(--mono); color:var(--clay); padding:0 4px; border:1px solid var(--line); border-radius:3px; margin-left:2px; vertical-align:super }
  .cite { font:12.5px var(--serif); color:var(--clay); margin-top:10px; padding-left:14px; border-left:2px solid var(--line) }
  .cite code { font:10.5px var(--mono); letter-spacing:.02em }
  .cite q { color:var(--ink); font-style:normal }
  pre, pre.code { white-space:pre-wrap; font:12.5px/1.55 var(--mono); margin:8px 0; background:var(--panel);
                  padding:14px 16px; border-radius:6px; max-height:420px; overflow:auto }

  .fb { display:flex; gap:8px; margin-top:14px; align-items:flex-start }
  .fb button { font:500 11px var(--mono); text-transform:uppercase; letter-spacing:.14em; border:1px solid var(--line);
               background:#fff; border-radius:5px; padding:9px 16px; cursor:pointer; color:var(--ink); transition:all .12s }
  .fb button:hover { border-color:var(--clay) }
  .fb button.acc { background:var(--acc); color:#fff; border-color:var(--acc) }
  .fb button.acc:hover { filter:brightness(.95) }
  .fb textarea { flex:1; font:14px var(--serif); border:1px solid var(--line); background:#fff; border-radius:5px;
                 padding:9px 12px; resize:vertical }
  .fb textarea:focus { outline:none; border-color:var(--acc) }
  details > summary { cursor:pointer; font-size:13.5px; padding:6px 0; font-style:italic; color:var(--clay) }
  details > summary:hover { color:var(--ink) }
  .muted { color:var(--clay); font-size:13px; font-style:italic }
  h3 { font:italic 500 16px var(--serif); margin:0 0 12px }

  .md { font:13.5px/1.5 var(--serif) } .md p { margin:0 0 7px } .md p:last-child { margin:0 }
  .md ul { margin:3px 0 7px; padding-left:20px } .md li { margin-bottom:2px } .md li br { display:none }
  .md h3,.md h4,.md h5,.md h6 { font:italic 500 1em var(--serif); margin:10px 0 4px }
  .md blockquote { border-left:2px solid var(--acc); margin:4px 0; padding:1px 12px; color:var(--clay) }
  .md code { font:12px var(--mono); background:var(--panel); padding:1px 4px; border-radius:3px }

  .docs { display:flex; gap:0; height:100%; margin:-18px -22px }
  .doclist { width:320px; border-right:1px solid var(--line); overflow-y:auto; padding:14px }
  .doclist .doc { width:100%; text-align:left; border:none; border-left:2px solid transparent; padding:10px 10px 10px 12px;
                  margin-bottom:2px; background:none; cursor:pointer; font:inherit; transition:border-color .12s, background .12s }
  .doclist .doc:hover { background:rgba(0,0,0,.02) }
  .doclist .doc.sel { border-left-color:var(--acc); background:#fff; box-shadow:var(--shadow) }
  .doclist .doc b { font:12px var(--mono); letter-spacing:.02em }
  .doclist .doc .s { font:12.5px/1.4 var(--serif); color:var(--clay); margin-top:5px; display:-webkit-box;
                     -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden }
  .docview { flex:1; overflow-y:auto; padding:18px 22px }
  .docview pre { max-height:none }
</style>
<header>
  <h1>🔍 Contracts · Inspector</h1>
  <p>Watch the analysis live. The Review tab shows anything waiting on you — answer questions back in chat; approve or reject what it learned here.</p>
</header>
<main>
  <aside id="runs"><p class="muted">loading…</p></aside>
  <div id="panel">
    <div class="banner" id="banner"></div>
    <nav id="tabs"></nav>
    <div id="detail"><p class="muted">pick a run</p></div>
  </div>
</main>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// Minimal markdown: escape FIRST so db content can't inject HTML, then transform.
const md = s => {
  let h = esc(s);
  h = h.replace(/```([\s\S]*?)```/g, (_,c)=>`<pre class="code">${c}</pre>`);
  h = h.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  h = h.replace(/\[cite:(\d+)\]/g, '<sup class="ref">$1</sup>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^(#{1,4}) (.+)$/gm, (_,x,t)=>`<h${x.length+2}>${t}</h${x.length+2}>`);
  h = h.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[\s>])\*([^*\n]+?)\*/g, '$1<em>$2</em>');
  h = h.replace(/^([-*]) (.+)$/gm, '<li>$2</li>').replace(/(<li>.*?<\/li>\n?)+/gs, m=>`<ul>${m.replace(/\n/g,'')}</ul>`);
  h = h.replace(/\n{2,}/g, '</p><p>').replace(/\n(?![<])/g, '<br>');
  return `<div class="md"><p>${h}</p></div>`;
};
// Pretty-print JSON if it parses; otherwise render as markdown.
const pretty = s => {
  try { const o = JSON.parse(s); return `<pre class="code">${esc(JSON.stringify(o, null, 2))}</pre>`; }
  catch { return md(s); }
};
const badge = s => `<span class="badge b-${esc(s)}">${esc(s)}</span>`;
const by = (rows, k) => rows.reduce((m,r)=>((m[r[k]] ??= []).push(r), m), {});
const _raw = decodeURIComponent(location.pathname.slice(1));
let sel = /^[A-Za-z0-9_.:-]{1,64}$/.test(_raw) ? _raw : null;
let tab = 'Brief', docOpen = null;
const corpusCache = {}, docCache = {};
const TABS = ['Brief','>','Findings','>','Report','|','Review','Corpus','Logs','|','Documents'];

function narrate(s) {
  if (s.status==='queued') return 'Waiting to start.';
  if (s.status==='awaiting_human') return `Paused — ${s.blocking_queue} question${s.blocking_queue===1?'':'s'} for you (Queue tab). Answer in chat.`;
  if (s.status==='running') return s.reports>0 ? 'Writing the report.' : s.findings>0 ? `Reading the corpus — ${s.findings} findings so far (round ${s.round}).` : 'Working out what to read.';
  if (s.status==='done') return `Done. ${s.uncited_claims>0 ? s.uncited_claims+' claims still uncited.' : 'Every claim cited.'}`;
  if (s.status==='failed') return 'Failed — see Events tab.';
  return s.status;
}
function citesHtml(list) {
  return (list||[]).map(c => `<div class="cite"><code>${esc(c.uri)}</code> [${c.start_off}–${c.end_off}] ${c.kind==='judged'?'<i>(judged)</i> ':''}<q>${esc(c.quote)}</q></div>`).join('');
}

async function loadRuns() {
  const runs = await fetch('/runs').then(r=>r.json());
  $('#runs').innerHTML = `<h2>Runs · ${runs.length}</h2>` + (runs.length
    ? runs.map(r => `
        <button class="run ${r.run_id===sel?'sel':''}" data-id="${esc(r.run_id)}">
          <div class="top">${badge(r.status)}<span class="id">${esc(r.run_id)}</span></div>
          <div class="q">${esc(r.question)}</div>
          <div class="meta">
            <span><b>${r.findings}</b> findings</span>
            ${r.blocking_queue>0?`<span style="color:#b91c1c"><b>${r.blocking_queue}</b> waiting</span>`:''}
            <span style="margin-left:auto"><b>$${(r.cost_usd||0).toFixed(2)}</b></span>
          </div>
        </button>`).join('')
    : '<p class="muted">no runs yet</p>');
  $('#runs').querySelectorAll('.run').forEach(b => b.onclick = () => { sel = b.dataset.id; docOpen = null; history.replaceState(null,'','/'+sel); loadDetail(); loadRuns(); });
}

async function loadDetail() {
  if (!sel) { $('#banner').textContent=''; $('#tabs').innerHTML=''; $('#detail').innerHTML='<p class="muted">pick a run</p>'; return; }
  const d = await fetch('/runs/'+encodeURIComponent(sel)).then(r=>r.json());
  if (!d.status) { $('#detail').innerHTML = '<p class="muted">not found</p>'; return; }
  const s = d.status, fc = by(d.finding_cites,'pid'), qc = by(d.queue_cites,'pid'), cc = by(d.claim_cites,'pid'), kc = by(d.knowledge_cites||[],'pid');
  const claimsByReport = by(d.claims, 'report_id');
  const cdocs = tab==='Documents'
    ? (corpusCache[s.corpus] ??= await fetch('/corpus/'+encodeURIComponent(s.corpus)).then(r=>r.json()))
    : null;

  $('#banner').innerHTML = `${badge(s.status)} ${esc(narrate(s))}<br>
    <span class="muted" style="font-family:var(--mono)">${esc(s.run_id)} · ${esc(s.corpus)} · round ${s.round} · $${(s.cost_usd||0).toFixed(2)} · ${s.turns} turns</span>`;

  const openQ = d.queue.filter(q=>q.status==='open').length;
  const propK = (d.knowledge||[]).filter(k=>k.status==='proposed').length;
  const docs = d.corpus_docs||[];
  const badParse = docs.filter(x=>x.parse_status && x.parse_status!=='ok').length;
  const counts = {Brief:d.briefs.length, Findings:d.findings.length, Report:d.reports.length,
    Review: (openQ+propK)||'', Corpus: badParse ? `${docs.length} ⚠${badParse}` : docs.length,
    Logs: d.audits.length+d.events.length, Documents: s.docs};
  $('#tabs').innerHTML = TABS.map(t => t==='|' ? '<span class="tabsep"></span>'
    : t==='>' ? '<span class="tabarr">→</span>'
    : `<button class="${t===tab?'on':''}" data-t="${t}">${t}<span class="n">${counts[t]||''}</span></button>`).join('');
  $('#tabs').querySelectorAll('button').forEach(b => b.onclick = () => { tab = b.dataset.t; loadDetail(); });

  const sec = (label, body) => `<h3 class="label" style="margin:18px 0 8px">${label}</h3>${body || '<p class="muted">none</p>'}`;
  const queueHtml = d.queue.map(q=>`<div class="card">${badge(q.status)} ${q.blocking?'<span class="badge" style="color:var(--err)">blocking</span> ':''}<b>${esc(q.question)}</b>
      ${q.context?`<div style="margin-top:6px">${md(q.context)}</div>`:''}
      ${q.answer?`<dl class="kv" style="margin-top:8px"><dt>answer</dt><dd>${md(q.answer)} <span class="muted">— ${esc(q.answered_by)}</span></dd></dl>`:q.status==='open'?'<p class="muted">answer this in chat</p>':''}
      ${citesHtml(qc[q.id])}</div>`).join('');
  const knowHtml = (d.knowledge||[]).map(k=>`<div class="card">${badge(k.status)}${md(k.fact)}${citesHtml(kc[k.id])}
      ${k.status==='proposed' ? `<div class="fb kn" data-k="${k.id}"><button class="acc" data-s="ratified">ratify</button><button data-s="rejected">reject</button></div>`
        : `<span class="muted"> — ${esc(k.ratified_by||'')}</span>`}</div>`).join('');
  const auditHtml = d.audits.map(a=>`<div class="card"><b>${esc(a.kind)}</b> <span class="muted" style="font-family:var(--mono)">n=${a.sample_n}</span>${pretty(a.result)}</div>`).join('');
  const eventHtml = `<div class="card">${d.events.map(e=>`<div class="muted" style="font-family:var(--mono)">${esc(e.at)} · ${esc(e.from_status)} → <b>${esc(e.to_status)}</b></div>`).join('') || '<span class="muted">none</span>'}</div>`;
  const panels = {
    Brief: d.briefs.map(b=>`<div class="flat"><h3>v${b.version} ${badge(b.status)}</h3><dl class="kv">
        <dt>rubric</dt><dd>${md(b.rubric)}</dd><dt>assumptions</dt><dd>${md(b.assumptions)}</dd>
        <dt>done when</dt><dd>${md(b.done_criteria)}</dd><dt>scope</dt><dd>${md(b.scope_intent)}</dd></dl></div>`).join('') || '<p class="muted">none yet</p>',
    Findings: d.findings.length ? d.findings.map(f=>`<div class="card"><span class="muted" style="font-family:var(--mono)">r${f.round} · ${esc(f.worker)} · ${f.kind}</span>${md(f.claim)}${citesHtml(fc[f.id])}</div>`).join('') : '<p class="muted">none yet</p>',
    Report: d.reports.map(r=>`<div class="flat">${md(r.body)}
        ${(claimsByReport[r.id]||[]).map(c=>`<details><summary>${(cc[c.id]||[]).map(x=>`<sup class="ref">${esc(x.id)}</sup>`).join('')} ${esc(c.claim)}</summary>${citesHtml(cc[c.id])}</details>`).join('')}
        <div class="fb" data-report="${r.id}"><button data-r="up">👍</button><button data-r="down">👎</button>
          <textarea rows="1" placeholder="optional: what was wrong, missing, or surprising?"></textarea>
          <button class="acc" data-r="">send</button></div></div>`).join('') || '<p class="muted">no report yet</p>',
    Review: sec('Questions — answer in chat', queueHtml) + sec('Knowledge proposals — ratify or reject', knowHtml),
    Corpus: `<p class="muted">${docs.length} documents in <b>${esc(s.corpus)}</b>${badParse?` · <span style="color:var(--err)">${badParse} need attention</span>`:''}</p>` +
      (docs.length ? `<table style="width:100%;font:12px var(--mono);border-collapse:collapse">
        <thead><tr style="text-align:left;color:var(--clay)"><th style="padding:6px 8px">uri</th><th>parse</th><th>pages</th><th>bytes</th><th>sha</th><th>family</th><th>parsed_at</th></tr></thead>
        <tbody>${docs.map(x=>`<tr style="border-top:1px solid var(--line)${x.parse_status&&x.parse_status!=='ok'?';background:rgba(184,92,92,.06)':''}">
          <td style="padding:6px 8px;font-family:var(--serif)">${esc(x.uri)}</td>
          <td>${x.parse_status?badge(x.parse_status):'<span class="muted">text</span>'}</td>
          <td>${x.pages||''}</td><td>${(x.bytes/1024).toFixed(1)}k</td>
          <td style="color:var(--faint)">${esc(x.sha)}</td><td>${esc(x.family)}</td>
          <td style="color:var(--faint)">${esc((x.parsed_at||'').slice(0,16).replace('T',' '))}</td>
        </tr>`).join('')}</tbody></table>` : '<p class="muted">no documents</p>'),
    Logs: sec('Audits', auditHtml) + sec('Status events', eventHtml),
    Documents: cdocs ? `<div class="docs">
        <div class="doclist">${cdocs.map(x=>`<button class="doc ${x.id===docOpen?'sel':''}" data-d="${x.id}">
          <b>${esc(x.uri)}</b> <span class="muted">${(x.chars/1000).toFixed(0)}k${x.category?' · '+esc(x.category):''}${x.dated?' · '+esc(x.dated):''}</span>
          ${x.summary?`<div class="s">${esc(x.summary)}</div>`:''}</button>`).join('')}</div>
        <div class="docview">${docOpen==null ? '<p class="muted">pick a document to read its parsed text</p>'
          : (docOpen in docCache) ? `<pre class="code">${esc(docCache[docOpen])}</pre>` : '<p class="muted">loading…</p>'}</div>
      </div>` : '<p class="muted">loading…</p>',
  };
  const scrolls = tab==='Documents' ? ['.doclist','.docview'].map(s=>$(s)?.scrollTop??0) : null;
  $('#detail').innerHTML = panels[tab];
  if (scrolls) ['.doclist','.docview'].forEach((s,i)=>{ const el=$(s); if(el) el.scrollTop=scrolls[i]; });

  $('#detail').querySelectorAll('.doc').forEach(b => b.onclick = async () => {
    docOpen = +b.dataset.d; loadDetail();
    if (!(docOpen in docCache)) {
      const j = await fetch('/doc/'+docOpen).then(res=>res.json());
      docCache[docOpen] = j.content ?? `[error: ${j.error||'fetch failed'}]`;
      loadDetail();
    }
  });

  $('#detail').querySelectorAll('.fb:not(.kn)').forEach(fb => fb.querySelectorAll('button').forEach(btn => btn.onclick = async () => {
    const note = fb.querySelector('textarea').value.trim();
    await fetch('/feedback', {method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({run_id: sel, report_id: +fb.dataset.report, rating: btn.dataset.r||undefined, note: note||undefined})});
    fb.innerHTML = '<span class="muted">thanks — recorded</span>';
  }));
  $('#detail').querySelectorAll('.fb.kn').forEach(fb => fb.querySelectorAll('button').forEach(btn => btn.onclick = async () => {
    await fetch('/knowledge/'+fb.dataset.k, {method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({status: btn.dataset.s, by: 'local'})});
    fb.innerHTML = `<span class="muted">${esc(btn.dataset.s)}</span>`;
  }));
}

loadRuns(); loadDetail(); setInterval(()=>{ loadRuns(); loadDetail(); }, 3000);
</script>
