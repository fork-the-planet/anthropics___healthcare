name: Claude Skill Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_call:
    secrets:
      # Deprecated: auth now uses workload identity federation (see review-skill job).
      # Kept optional so existing callers that still pass the secret don't break.
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  detect-skills:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.detect.outputs.skills }}
      has_skills: ${{ steps.detect.outputs.has_skills }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect skill changes
        id: detect
        run: |
          # Get changed files in this PR
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Find all skill directories (directories containing SKILL.md)
          skill_dirs=$(find . -name "SKILL.md" -type f | xargs -I {} dirname {} | sed 's|^\./||')

          # Find which skills have changes
          affected_skills=()
          for skill_dir in $skill_dirs; do
            for file in $changed_files; do
              if [[ "$file" == "$skill_dir/"* ]] || [[ "$file" == "$skill_dir" ]]; then
                affected_skills+=("$skill_dir")
                break
              fi
            done
          done

          # Remove duplicates and convert to JSON array
          if [ ${#affected_skills[@]} -gt 0 ]; then
            unique_skills=$(printf '%s\n' "${affected_skills[@]}" | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "skills=$unique_skills" >> $GITHUB_OUTPUT
            echo "has_skills=true" >> $GITHUB_OUTPUT
            echo "Affected skills: $unique_skills"
          else
            echo "skills=[]" >> $GITHUB_OUTPUT
            echo "has_skills=false" >> $GITHUB_OUTPUT
            echo "No skill changes detected"
          fi

  review-skill:
    needs: detect-skills
    if: needs.detect-skills.outputs.has_skills == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: ${{ fromJson(needs.detect-skills.outputs.skills) }}
      fail-fast: false
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Skill Review
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via workload identity federation: the workflow's GitHub OIDC token is
          # exchanged for short-lived Claude API credentials (requires id-token: write).
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          plugin_marketplaces: 'https://github.com/anthropics/skills.git'
          plugins: 'example-skills@anthropic-agent-skills'
          claude_args: '--allowedTools "Bash(gh pr comment:*),Bash(git:*),Read,Glob,Grep,Skill"'
          prompt: |
            Use the skill-creator skill to review the **${{ matrix.skill }}** skill in PR #${{ github.event.pull_request.number }}.

            Use `git diff origin/${{ github.base_ref }} -- ${{ matrix.skill }}/` to see what changed. If this is a new skill, provide a full review. If it's changes to an existing skill, focus on the changes.

            Post your feedback as a comment using `gh pr comment`. Use the skill title in the header.
